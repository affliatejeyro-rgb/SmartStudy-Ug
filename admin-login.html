<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | SmartStudy UG</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
<style>
body{font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#0b1220,#05070d);color:white;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;}
.login-box{background:rgba(255,255,255,0.05);padding:40px;border-radius:20px;text-align:center;box-shadow:0 0 20px rgba(0,0,0,0.7);}
.login-box h2{margin-bottom:20px;}
.login-box input{padding:10px;margin:10px 0;width:100%;border-radius:10px;border:none;}
.login-box button{padding:10px 20px;border:none;border-radius:10px;background:linear-gradient(135deg,#6EA8FF,#B78BFF);color:white;font-weight:600;cursor:pointer;}
#errorMsg{color:#ff4d4d;margin-top:10px;}
</style>
</head>
<body>

<div class="login-box">
<h2>Admin Login</h2>
<input type="password" id="adminPassword" placeholder="Enter Password">
<button onclick="loginAdmin()">Login</button>
<div id="errorMsg"></div>
</div>

<script>
const PASSWORD = "NampozaJ"; // Admin password

function loginAdmin(){
    const input = document.getElementById("adminPassword").value;
    if(input === PASSWORD){
        // Hashing password in localStorage for extra security (simple hash)
        localStorage.setItem("adminLoggedIn", btoa(input));
        window.location.href = "admin-dashboard.html";
    } else {
        document.getElementById("errorMsg").textContent = "Incorrect Password!";
    }
}

// Prevent dashboard access if already logged in
if(localStorage.getItem("adminLoggedIn") === btoa(PASSWORD)){
    window.location.href = "admin-dashboard.html";
}
</script>

</body>
</html>
